<svg xmlns="http://www.w3.org/2000/svg" width="921" height="2048" viewBox="0 0 921 2048">
  <defs>
    <filter id="shadow" x="-20%" y="-40%" width="140%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000" flood-opacity="0.22"/>
    </filter>
    <style>
      .screen-title { font-family: DejaVu-Sans; font-size: 44px; font-weight: 700; fill: #202124; }
      .label { font-family: DejaVu-Sans; font-size: 32px; font-weight: 700; fill: #000; }
      .input { font-family: DejaVu-Sans; font-size: 32px; fill: #111; }
      .button { font-family: DejaVu-Sans; font-size: 31px; fill: #111; }
      .button-primary { font-family: DejaVu-Sans; font-size: 31px; font-weight: 700; fill: #fff; }
      .danger { font-family: DejaVu-Sans; font-size: 31px; fill: #a0431f; }
    </style>
  </defs>

  <rect width="921" height="2048" fill="#f7f7f7"/>
  <rect width="921" height="242" fill="#fff"/>
  <path d="M78 163 L49 181 L78 199" fill="none" stroke="#222" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="51" y1="181" x2="101" y2="181" stroke="#222" stroke-width="7" stroke-linecap="round"/>
  <text x="164" y="196" class="screen-title">Edit Checklist</text>
  <line x1="0" y1="242" x2="921" y2="242" stroke="#d8d8d8" stroke-width="2"/>

  <text x="36" y="312" class="label">Title</text>
  <rect x="36" y="331" width="849" height="82" rx="12" fill="#f7f7f7" stroke="#cfcfcf" stroke-width="2.5"/>
  <text x="57" y="384" class="input">Pre-flight</text>

  <text x="36" y="486" class="label">Items</text>

  <g>
    <rect x="36" y="513" width="849" height="118" rx="12" fill="#f7f7f7" stroke="#dddddd" stroke-width="2"/>
    <circle cx="73" cy="555" r="4.8" fill="#777"/>
    <circle cx="93" cy="555" r="4.8" fill="#777"/>
    <circle cx="73" cy="575" r="4.8" fill="#777"/>
    <circle cx="93" cy="575" r="4.8" fill="#777"/>
    <circle cx="73" cy="595" r="4.8" fill="#777"/>
    <circle cx="93" cy="595" r="4.8" fill="#777"/>
    <rect x="124" y="533" width="574" height="78" rx="11" fill="#f7f7f7" stroke="#cfcfcf" stroke-width="2.5"/>
    <text x="145" y="584" class="input">Check fuel</text>
    <rect x="726" y="533" width="139" height="78" rx="11" fill="#f7f7f7" stroke="#111" stroke-width="2.5"/>
    <text x="752" y="584" class="danger">Delete</text>
  </g>

  <line x1="58" y1="675" x2="863" y2="675" stroke="#0a84ff" stroke-width="7" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="36" y="718" width="849" height="118" rx="12" fill="#fff" stroke="#0a84ff" stroke-width="4"/>
    <circle cx="73" cy="760" r="4.8" fill="#0a84ff"/>
    <circle cx="93" cy="760" r="4.8" fill="#0a84ff"/>
    <circle cx="73" cy="780" r="4.8" fill="#0a84ff"/>
    <circle cx="93" cy="780" r="4.8" fill="#0a84ff"/>
    <circle cx="73" cy="800" r="4.8" fill="#0a84ff"/>
    <circle cx="93" cy="800" r="4.8" fill="#0a84ff"/>
    <rect x="124" y="738" width="574" height="78" rx="11" fill="#fff" stroke="#cfcfcf" stroke-width="2.5"/>
    <text x="145" y="789" class="input">Review route</text>
    <rect x="726" y="738" width="139" height="78" rx="11" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <text x="752" y="789" class="danger">Delete</text>
  </g>

  <g opacity="0.72">
    <rect x="36" y="884" width="849" height="118" rx="12" fill="#f7f7f7" stroke="#dddddd" stroke-width="2"/>
    <circle cx="73" cy="926" r="4.8" fill="#777"/>
    <circle cx="93" cy="926" r="4.8" fill="#777"/>
    <circle cx="73" cy="946" r="4.8" fill="#777"/>
    <circle cx="93" cy="946" r="4.8" fill="#777"/>
    <circle cx="73" cy="966" r="4.8" fill="#777"/>
    <circle cx="93" cy="966" r="4.8" fill="#777"/>
    <rect x="124" y="904" width="574" height="78" rx="11" fill="#f7f7f7" stroke="#cfcfcf" stroke-width="2.5"/>
    <text x="145" y="955" class="input">Start engine</text>
    <rect x="726" y="904" width="139" height="78" rx="11" fill="#f7f7f7" stroke="#111" stroke-width="2.5"/>
    <text x="752" y="955" class="danger">Delete</text>
  </g>

  <rect x="36" y="1043" width="182" height="84" rx="12" fill="#f7f7f7" stroke="#111" stroke-width="2.5" stroke-dasharray="8 9"/>
  <text x="66" y="1097" class="button">Add item</text>

  <rect x="36" y="1165" width="151" height="92" rx="12" fill="#0a84ff"/>
  <text x="76" y="1224" class="button-primary">Save</text>
  <rect x="214" y="1165" width="179" height="92" rx="12" fill="#f7f7f7" stroke="#111" stroke-width="2.5"/>
  <text x="256" y="1224" class="button">Cancel</text>

  <line x1="341" y1="2001" x2="580" y2="2001" stroke="#666" stroke-width="8" stroke-linecap="round"/>
</svg>
